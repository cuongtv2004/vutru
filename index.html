  #ipFun { margin-top:10px; padding:9px 10px; font-size:12px; line-height:1.55; color:#fdeccb; background:rgba(246,194,74,0.12); border-left:3px solid #f6c24a; border-radius:6px; }

  #quizClose, #quizSetupClose { color:#cfd7ea; background:rgba(255,255,255,0.1); }

  #compareBtn { width:100%; margin:6px 0 2px; padding:8px; font-size:12px; font-weight:bold; color:#1a1430; background:linear-gradient(90deg,#b79bf0,#d4c2ff); border:none; border-radius:8px; cursor:pointer; font-family:inherit; }

<body>

<audio id="bgm" src="assets/audio.mp3" loop preload="auto"></audio>

<div id="wrap">
  <canvas id="space"></canvas>
  <div id="labels"></div>

  <button id="menuBtn" class="corner-btn" aria-label="Mở danh sách thiên thể">☰</button>
  <button id="langBtn" class="corner-btn" aria-label="Đổi ngôn ngữ">EN</button>
  <button id="musicBtn" class="corner-btn" aria-label="Bật/tắt nhạc nền">♪</button>

  <div id="panel">
    <div id="uiTitle" style="font-size:13px;font-weight:bold;color:#dfe6f5;letter-spacing:1px;">HỆ MẶT TRỜI</div>
    <button id="tourStartBtn" type="button">🚀 Khám phá có hướng dẫn</button>
    <button id="quizStartBtn" type="button">🎯 Đố vui</button>
    <button id="compareBtn" type="button">📏 So sánh kích thước</button>
    <div class="lbl-sec" id="uiSimDate" style="margin-top:8px;">NGÀY MÔ PHỎNG</div>
    <div id="simDate" style="font-size:13px;color:#dfe6f5;margin-bottom:10px;">—</div>
    <div class="lbl-sec" id="uiTime">ĐIỀU KHIỂN THỜI GIAN</div>
    <div style="display:flex;align-items:center;gap:6px;margin:4px 0;">
      <button id="playBtn" aria-label="Tạm dừng" style="width:34px;height:26px;padding:0;font-size:11px;line-height:1;color:#dfe6f5;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.3);border-radius:6px;cursor:pointer;">❚❚</button>
      <span id="spdOut" style="font-size:12px;color:#dfe6f5;">10 ngày/giây</span>
    </div>
    <input type="range" id="spd" min="0" max="200" step="1" value="10" style="width:100%;" aria-label="Tốc độ thời gian" />
    <div class="lbl-sec" id="uiDisplay">HIỂN THỊ</div>
    <label class="chk"><input type="checkbox" id="cbOrbit" checked /><span id="uiOrbit">Đường quỹ đạo</span></label>
    <label class="chk"><input type="checkbox" id="cbLabel" checked /><span id="uiLabels">Nhãn tên</span></label>
    <label class="chk"><input type="checkbox" id="cbBelt" checked /><span id="uiBelt">Vành tiểu hành tinh</span></label>
    <label class="chk"><input type="checkbox" id="cbNarrate" /><span id="uiNarrate">Đọc lời kể</span></label>
    <div class="lbl-sec" id="uiBodies">THIÊN THỂ</div>
    <div id="bodyList"></div>
    <div id="hint" style="font-size:11px;color:#5d6680;margin-top:12px;line-height:1.6;padding-bottom:8px;"></div>
  </div>

  <div id="infoPanel">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div id="ipName" style="font-size:16px;font-weight:bold;color:#eef2fb;">Mặt Trời</div>
      <button id="ipClose" aria-label="Đóng" style="width:28px;height:28px;padding:0;font-size:15px;line-height:1;color:#9aa6c2;border:none;background:transparent;cursor:pointer;">✕</button>
    </div>
    <img id="ipImg" alt="" style="width:100%;height:100px;object-fit:cover;border-radius:8px;margin:10px 0;background:#101627;" />
    <div id="ipDesc" style="font-size:12px;color:#b6c0d8;line-height:1.65;"></div>
    <div id="ipFun"></div>
    <div id="ipStats" style="margin-top:12px;border-top:1px solid rgba(120,140,190,0.3);padding-top:10px;"></div>
  </div>

  <div id="quizBar">
    <button id="quizExit" aria-label="Thoát đố vui">✕</button>
    <div id="quizQ"></div>
    <div id="quizMetaRow"><span id="quizMeta"></span><span id="quizFb"></span></div>
  </div>

  <div id="quizSetup">
    <div class="quiz-card">
      <div id="quizSetupTitle" class="quiz-card-title">Chọn chủ đề &amp; số câu</div>
      <div id="topicChips" class="chips">
        <button class="chip" type="button" data-topic="all">Tất cả</button>
        <button class="chip" type="button" data-topic="planet">Hành tinh</button>
        <button class="chip" type="button" data-topic="moon">Mặt trăng</button>
        <button class="chip" type="button" data-topic="size">Kích thước</button>
      </div>
      <div id="countChips" class="chips">
        <button class="chip" type="button" data-count="6">6</button>
        <button class="chip" type="button" data-count="10">10</button>
      </div>
      <div id="quizBestLine" class="quiz-best"></div>
      <button id="quizBegin" type="button">Bắt đầu</button>
      <button id="quizSetupClose" type="button">Đóng</button>
    </div>
  </div>

  <div id="quizResult">
    <div class="quiz-card">
      <div id="quizStars">⭐</div>
      <div id="quizResultTxt"></div>
      <div id="quizRecord" class="quiz-best"></div>
      <button id="quizReplay" type="button">Chơi lại</button>
      <button id="quizClose" type="button">Đóng</button>
    </div>
  </div>

  <div id="tourBar">
    <button id="tourPrev" aria-label="Trước">◀</button>
    <button id="tourPlay" aria-label="Tạm dừng tour">❚❚</button>
    <button id="tourNext" aria-label="Tiếp">▶</button>
    <span id="tourPos">1/9</span>
    <button id="tourExit" aria-label="Thoát tour">✕</button>
  </div>

  <div id="compareCap"></div>

  <div id="loader">
    <div class="planet-spin"></div>
    <div id="loadTxt">Đang tải vũ trụ…</div>
    <div id="barWrap"><div id="bar"></div></div>
  </div>

  <div id="nowebgl">
    <h2 id="nwTitle">Trình duyệt không hỗ trợ 3D</h2>
    <p id="nwBody">Thiết bị hoặc trình duyệt của bạn chưa bật WebGL. Hãy thử mở bằng Chrome/Edge/Firefox mới, hoặc bật tăng tốc phần cứng trong cài đặt.</p>
  </div>
</div>

    const mesh = new THREE.Mesh(geo, mat);
    const pivot = new THREE.Object3D();
    (parent ? parent.mesh : scene).add(pivot);

  // ---- pointer / camera controls ----
  const pointers = new Map();
  let moved = 0, pinchDist = 0;
  canvas.addEventListener('pointerdown', e => {
    pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if (pointers.size === 1) moved = 0;
    if (pointers.size === 2){ const [a,b] = [...pointers.values()]; pinchDist = Math.hypot(a.x-b.x, a.y-b.y); }
    canvas.style.cursor = 'grabbing';
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', e => {
    if (!pointers.has(e.pointerId)) return;
    const prev = pointers.get(e.pointerId);
    const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
    pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    moved += Math.abs(dx) + Math.abs(dy);
    if (pointers.size === 1){
      camTheta -= dx * 0.006;
      camPhi = Math.min(Math.PI - 0.15, Math.max(0.15, camPhi - dy * 0.006));
    } else if (pointers.size === 2){

      const d = Math.hypot(a.x-b.x, a.y-b.y);
      if (pinchDist > 0) targetDist = Math.min(600, Math.max((selected?selected.r:9)*2.5, targetDist * pinchDist / d));
      pinchDist = d;
    }
  });
  function endPointer(e){
    const wasSingle = pointers.size === 1;
    pointers.delete(e.pointerId);

    if (wasSingle && moved < 8 && !compareMode){
      const rect = canvas.getBoundingClientRect();

      const o = actx.createOscillator(), g = actx.createGain();
      o.connect(g); g.connect(actx.destination); o.type = 'sine';
      const t = actx.currentTime;
      if (ok){ o.frequency.setValueAtTime(660, t); o.frequency.setValueAtTime(990, t+0.12); }
      else { o.frequency.setValueAtTime(320, t); o.frequency.setValueAtTime(200, t+0.14); }
      g.gain.setValueAtTime(0.14, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.32);
      o.start(t); o.stop(t+0.34);
    } catch(e){}

    document.getElementById('quizBestLine').textContent = bestLineText();
    syncSetupUI();
    document.getElementById('quizSetup').classList.add('on');
    if (isMobile) panel.classList.remove('open');
  }
  function beginQuiz(){
    document.getElementById('quizSetup').classList.remove('on');
    document.getElementById('quizResult').classList.remove('on');
    const pool = quizTopic === 'all' ? QUIZ.slice() : QUIZ.filter(q => q.cat === quizTopic);
    quizSet = shuffle(pool).slice(0, Math.min(quizCount, pool.length));
    quizIdx = 0; score = 0; quizActive = true; quizLock = false;
    quizBar.classList.add('on');
    if (isMobile) panel.classList.remove('open');
    showQuestion();
  }
  function quizAnswer(id){
    if (!quizActive || quizLock) return;
    quizLock = true;
    const correct = id === quizSet[quizIdx].answer;
    const fb = document.getElementById('quizFb');
    fb.textContent = correct ? T().ui.quizCorrect : T().ui.quizWrong;
    fb.style.color = correct ? '#7ee08a' : '#f6896a';
    if (correct){ score++; confetti(); blip(true); }
    else { blip(false); selectBody(byId[quizSet[quizIdx].answer]); }
    updateQuizMeta();
    setTimeout(() => {
      quizIdx++; quizLock = false;
      if (quizIdx >= quizSet.length) endQuiz(); else showQuestion();
    }, correct ? 1400 : 2000);
  }
  function endQuiz(){
    quizActive = false;
    quizBar.classList.remove('on');
    const total = quizSet.length, pct = total ? score/total : 0;
    const prev = loadBest();
    const isRecord = prev && prev.total && pct > prev.score/prev.total;
    if (!prev || !prev.total || pct > prev.score/prev.total) localStorage.setItem(QUIZ_BEST_KEY, JSON.stringify({score, total}));
    document.getElementById('quizResultTxt').textContent = T().ui.quizResult(score, total);
    document.getElementById('quizRecord').textContent = isRecord ? T().ui.quizNewRecord : bestLineText();
    document.getElementById('quizStars').textContent = '⭐'.repeat(Math.max(1, Math.round(pct * 3)));
    document.getElementById('quizResult').classList.add('on');
    if (total && score === total) confetti();
  }
  function closeQuiz(){
    quizActive = false; quizLock = false;
    quizBar.classList.remove('on');
    document.getElementById('quizResult').classList.remove('on');
    document.getElementById('quizSetup').classList.remove('on');
  }
  function pickBody(b){ selectBody(b); if (quizActive && !quizLock) quizAnswer(b.id); }

  document.getElementById('quizStartBtn').addEventListener('click', openQuizSetup);
  document.getElementById('quizExit').addEventListener('click', closeQuiz);
  document.getElementById('quizReplay').addEventListener('click', beginQuiz);
  document.getElementById('quizClose').addEventListener('click', closeQuiz);
  document.getElementById('quizBegin').addEventListener('click', beginQuiz);
  document.getElementById('quizSetupClose').addEventListener('click', closeQuiz);
  document.querySelectorAll('#topicChips .chip').forEach(c => c.addEventListener('click', () => { quizTopic = c.dataset.topic; syncSetupUI(); }));
  document.querySelectorAll('#countChips .chip').forEach(c => c.addEventListener('click', () => { quizCount = +c.dataset.count; syncSetupUI(); }));

  // ---- size-comparison mode toggle ----
  let compareMode = false, savedCam = null;
  const compareBtn = document.getElementById('compareBtn');
  const compareCap = document.getElementById('compareCap');
  function setCompare(on){
    if (on === compareMode) return;
    compareMode = on;
    if (on){
      stopTour(); closeQuiz();
      savedCam = {theta:camTheta, phi:camPhi, dist:targetDist};
      for (const b of bodies){ b.mesh.visible = false; if (b.orbitLine) b.orbitLine.visible = false; }
      beltGroup.visible = false;
      compareGroup.visible = true;
      camTheta = Math.PI/2; camPhi = Math.PI/2 - 0.12; targetDist = compareWidth * 0.62 + 6;
      compareBtn.classList.add('active');
      compareCap.classList.add('on');
      ip.style.display = 'none';
      if (isMobile) panel.classList.remove('open');
    } else {
      for (const b of bodies) b.mesh.visible = true;
      const ob = document.getElementById('cbOrbit').checked;
      for (const b of bodies) if (b.orbitLine) b.orbitLine.visible = ob;
      beltGroup.visible = document.getElementById('cbBelt').checked;
      compareGroup.visible = false;
      if (savedCam){ camTheta = savedCam.theta; camPhi = savedCam.phi; targetDist = savedCam.dist; }
      compareBtn.classList.remove('active');
      compareCap.classList.remove('on');
      ip.style.display = isMobile ? 'none' : '';
    }
  }
  compareBtn.addEventListener('click', () => setCompare(!compareMode));

  applyLang();
  selectBody(byId.sun);
  if (isMobile) ip.style.display = 'none';

  // ---- render loop ----
  const tmp = new THREE.Vector3();
  let lastT = null;
  function tick(t){
    if (lastT === null) lastT = t;
    const dt = Math.min((t-lastT)/1000, 0.1); lastT = t;
    if (playing){
      days += speed*dt;
      for (const b of bodies) if (b.period){
        b.angle += (2*Math.PI/b.period)*speed*dt;
        b.mesh.position.set(Math.cos(b.angle)*b.orbit, 0, Math.sin(b.angle)*b.orbit);
      }
      beltGroup.rotation.y += (2*Math.PI/1800)*speed*dt;
      const d = new Date(startDate.getTime() + days*86400000);
      document.getElementById('simDate').textContent = d.toLocaleDateString(T().locale, {month:'short', day:'numeric', year:'numeric'});
    }
    for (const b of bodies) b.mesh.rotation.y += 0.3*dt;
    if (compareMode) for (const c of compareItems) c.mesh.rotation.y += 0.2*dt;

    if (touring && !tourPaused) camTheta -= 0.07*dt;
    camDist += (targetDist - camDist) * Math.min(1, dt*4);
    if (compareMode) tmp.set(0,0,0); else selected.mesh.getWorldPosition(tmp);
    camera.position.set(
      tmp.x + camDist*Math.sin(camPhi)*Math.cos(camTheta),
      tmp.y + camDist*Math.cos(camPhi),
      tmp.z + camDist*Math.sin(camPhi)*Math.sin(camTheta));
    camera.lookAt(tmp);

    const w = wrap.clientWidth, h = wrap.clientHeight;
    if (compareMode){
      for (const b of bodies) b.label.style.display = 'none';
      for (const c of compareItems){
        if (!showLabels){ c.label.style.display = 'none'; continue; }
        c.mesh.getWorldPosition(tmp);
        const v = tmp.clone().project(camera);
        if (v.z > 1 || v.x < -1 || v.x > 1 || v.y < -1 || v.y > 1){ c.label.style.display = 'none'; continue; }
        c.label.style.display = '';
        c.label.style.left = ((v.x+1)/2*w) + 'px';
        c.label.style.top = ((-v.y+1)/2*h - 10) + 'px';
      }
    } else {
      for (const c of compareItems) c.label.style.display = 'none';
      for (const b of bodies){
        if (!showLabels || b.indent && selected.parent !== b.parent && selected !== b.parent && selected !== b){
          b.label.style.display = 'none'; continue;
        }
        b.mesh.getWorldPosition(tmp);
        const v = tmp.clone().project(camera);
        if (v.z > 1 || v.x < -1 || v.x > 1 || v.y < -1 || v.y > 1){ b.label.style.display = 'none'; continue; }
        b.label.style.display = '';
        b.label.style.left = ((v.x+1)/2*w) + 'px';
        b.label.style.top = ((-v.y+1)/2*h - 10) + 'px';
      }
    }
    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  resize();
  requestAnimationFrame(tick);
}
</script>
</body>
</html>
